    <!-- External Assets with Smart Cache Buster ?v=1.0 -->

    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@600;700&display=swap&v=1.0" rel="stylesheet">

    <style>
        :root {
            /* Kevin's Admin Global Settings */
            --divi-header: 30px;
            --divi-body: 14px;
            
            /* S&K Brand Palette */
            --sk-maroon: rgb(62, 1, 0);
            --sk-gold: #FFC627;
            --sk-nav-gold: rgb(218, 164, 33);
            --sk-separator: #BBA28C;
            
            /* Precision Dimensions Locked */
            --header-height: 148px;
            --footer-height: 237px;
            --menu-gap: 26px; 
            --logo-to-home-gap: 808px;
            
            /* New Spacing Standards (Ref: Image Measurements) */
            --footer-label-gap: 24px;   /* Image dfa71a.png */
            --copyright-top-gap: 89px; /* Image dfa6a0.png */
        }

        /* Base Typography & Global Standards */
        body {
            font-family: 'Poppins', sans-serif;
            font-size: var(--divi-body);
            margin: 0;
            padding-top: var(--header-height);
            overflow-wrap: break-word;
            background-color: #fcfcfc;
            color: #333333;
        }

        h1, h2, h3 {
            font-size: var(--divi-header);
            line-height: 1.2;
        }

        /* --- SECTION: HEADER CONSTRUCTION --- */
        header#main-header {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
            border-bottom: 4px solid var(--sk-separator);
            height: var(--header-height) !important;
            display: flex;
            align-items: center;
        }

        /* Initial State (Maroon Theme) */
        .header-top {
            background-color: var(--sk-maroon);
            color: #FFFFFF;
        }

        /* Scrolled State (White Theme) */
        .header-scrolled {
            background-color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            color: #000000;
            border-bottom: 4px solid var(--sk-separator);
        }

        /* Logo Branding */
        #header-logo {
            width: 420px;
            max-width: 100%;
            height: auto;
            transition: all 0.4s ease;
        }

        /* Navigation Container with Precision Spacing */
        .header-inner-wrap {
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: var(--menu-gap);
            margin-left: var(--logo-to-home-gap);
        }

        .nav-link {
            color: white;
            font-family: "Open Sans", sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--sk-gold);
        }

        .header-scrolled .nav-link {
            color: #222222;
        }

        .header-scrolled .nav-link.active {
            color: var(--sk-maroon);
        }

        /* Header Phone Display Style */
        .header-phone {
            color: var(--sk-gold);
            font-family: "Open Sans", sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .header-phone:hover {
            color: white;
        }

        .header-scrolled .header-phone {
            color: var(--sk-maroon);
        }

        .header-scrolled .header-phone:hover {
            color: var(--sk-nav-gold);
        }

        /* --- SECTION: FOOTER CONSTRUCTION (Locked 237px) --- */
        footer#main-footer {
            background-color: var(--sk-maroon);
            color: white;
            height: var(--footer-height);
            border-top: 5px solid var(--sk-gold);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            padding: 0 20px;
        }

        .footer-grid {
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            gap: 0px; /* Use grid columns for equal distribution */
        }

        /* Footer Label: Georgia Precision Style */
        .footer-label {
            display: block;
            color: rgb(255, 255, 255); 
            font-family: Georgia, Georgia, "Times New Roman", serif;
            font-size: 14px; 
            font-weight: 500; 
            height: 24.5px; 
            line-height: 24.5px; 
            margin: 0 0 var(--footer-label-gap) 0; /* Precise 24px Gap below label */
            padding: 0; 
            text-align: center; 
            -webkit-font-smoothing: antialiased; 
            vertical-align: baseline;
            unicode-bidi: isolate;
        }

        /* Footer Value: Abril Fatface Precision Style Sync */
        .footer-value {
            display: block;
            color: rgb(255, 255, 255); 
            font-family: "Abril Fatface", display; 
            font-size: 18px; 
            font-weight: 500; 
            line-height: 25.2px; 
            height: auto; 
            padding-bottom: 10px; 
            text-align: center;
            text-decoration: none;
            transition: color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            vertical-align: baseline;
            unicode-bidi: isolate;
        }

        .footer-value:hover {
            color: var(--sk-gold); 
        }

        /* Copyright Section: Precision Style Sync (Ref: image_dfa6a0.png & query) */
        .copyright-bar {
            width: 100%;
            text-align: center;
            margin-top: var(--copyright-top-gap); /* Precise 89px Gap from email */
            display: block;
            color: rgb(255, 255, 255); /* White as specified */
            font-family: Georgia, Georgia, "Times New Roman", serif;
            font-size: 18px; 
            font-weight: 700; /* Bold */
            height: 35.2px; 
            line-height: 25.2px; 
            padding-bottom: 10px;
            -webkit-font-smoothing: antialiased;
            vertical-align: baseline;
            unicode-bidi: isolate;
        }
    </style>
</head>
<body>

    <!-- Main Header Component (Locked 148px) -->
    <header id="main-header" class="header-top fixed top-0 left-0 w-full z-[1000]">
        <div class="header-inner-wrap">
            
            <!-- Branding -->
            <div class="flex-shrink-0">
                <a href="https://werewolf3788.github.io/SKVentureSigns/">
                    <img src="https://skventuresigns.com/wp-content/uploads/2025/03/SK-Sign-White.png?v=1.0" alt="S&K Venture Signs" id="header-logo" />
                </a>
            </div>
            
            <!-- Precision Navigation (808px Gap from Logo) -->
            <nav class="nav-container">
                <a href="index.html" class="nav-link">Home</a>
                <a href="Locations.html" class="nav-link active">Locations</a>
                <a href="Services.html" class="nav-link">Services</a>
                <a href="Clients.html" class="nav-link">Clients</a>
                <a href="Contact.html" class="nav-link">Contact</a>
                
                <!-- CTA Replacement Phone -->
                <a href="tel:8449074450" class="header-phone">844-907-4450</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area: Ready for Injection -->
    <main class="w-full min-h-[80vh]">
        <!-- [ADD PAGE CONTENT HERE] -->
    </main>

    <!-- Global Footer (Locked 237px) -->
    <footer id="main-footer">
        <div class="footer-grid">
            <!-- Call Section -->
            <div class="footer-col">
                <p class="footer-label">Give Us a Call</p>
                <div class="flex flex-col">
                    <a href="tel:6187084450" class="footer-value">618-708-4450 or 844-907-4450</a>
                </div>
            </div>

            <!-- Email Section -->
            <div class="footer-col">
                <p class="footer-label">Send Us an Email</p>
                <a href="mailto:Scott.Robinson@skventuresigns.com" class="footer-value">Scott.Robinson@skventuresigns.com</a>
            </div>

            <!-- Office Section -->
            <div class="footer-col">
                <p class="footer-label">Visit Our Office</p>
                <a href="https://www.google.com/maps/search/?api=1&query=607+W+Clark+Ave+Effingham+IL+62401" target="_blank" class="footer-value">
                    607 W Clark Ave  Effingham, IL  62401

            </div>
        </div>

        <!-- Copyright Bar (Locked Georgia Style with 89px margin) -->
        <h5 class="copyright-bar">
            © 2025 S&K Venture Signs
        </h5>
    </footer>

    <script>
        /**
         * SECTION: ASSETS
         */
        const LOGO_BLACK = "https://skventuresigns.com/wp-content/uploads/2025/03/SK-Sign-Black.png?v=1.0";
        const LOGO_WHITE = "https://skventuresigns.com/wp-content/uploads/2025/03/SK-Sign-White.png?v=1.0";

        /**
         * SECTION: INITIALIZATION
         */
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        /**
         * SECTION: SCROLL LOGIC
         * Handles background swap while maintaining 148px height.
         */
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            const logo = document.getElementById('header-logo');
            
            if (window.scrollY > 40) { 
                header.classList.add('header-scrolled');
                header.classList.remove('header-top');
                logo.src = LOGO_BLACK; 
            } else { 
                header.classList.add('header-top');
                header.classList.remove('header-scrolled');
                logo.src = LOGO_WHITE; 
            }
        });
    </script>
</body>
</html>
